<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>BBJF App Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7faf8 0%, #eef5f1 100%);
        color: #213640;
        font-family: Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      main {
        width: min(92vw, 520px);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.1);
        padding: 32px;
      }
      img {
        width: 72px;
        height: 72px;
        border-radius: 999px;
        object-fit: cover;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: clamp(28px, 7vw, 44px);
        line-height: 1;
        letter-spacing: -0.04em;
      }
      p {
        margin: 0;
        color: #5f7380;
        font-size: 16px;
        line-height: 1.7;
      }
      button {
        margin-top: 22px;
        border: 0;
        border-radius: 14px;
        background: #18794e;
        color: #fff;
        cursor: pointer;
        font-weight: 800;
        padding: 12px 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/bbjf-icon-512.png" alt="BBJF" />
      <h1>You are offline</h1>
      <p>The BBJF app is installed, but this page needs an internet connection. Please reconnect and try again.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
